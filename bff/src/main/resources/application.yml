server:
  port: 8080

spring:
  application:
    name: bff
  cloud:
    gateway:
      discovery:
        locator:
          enabled: false
      routes:
        - id: auth-server-route
          uri: lb://ms-auth-server
          predicates:
            - Path=/api/auth/**

        - id: catalog-route
          uri: lb://ms-catalog
          predicates:
            - Path=/api/catalog/**
          filters:
            - JwtAuthentication

        - id: stock-engine-route
          uri: lb://ms-stock-engine
          predicates:
            - Path=/api/stock/**
          filters:
            - JwtAuthentication

        - id: supplier-procurement-route
          uri: lb://ms-supplier-procurement
          predicates:
            - Path=/api/procurement/**
          filters:
            - JwtAuthentication

        - id: job-orders-route
          uri: lb://ms-job-orders
          predicates:
            - Path=/api/jobs/**
          filters:
            - JwtAuthentication

        - id: shopping-cart-route
          uri: lb://ms-shopping-cart
          predicates:
            - Path=/api/cart/**
          filters:
            - JwtAuthentication

        - id: appointment-route
          uri: lb://ms-appointment-scheduler
          predicates:
            - Path=/api/appointments/**
          filters:
            - JwtAuthentication

        - id: vehicle-history-route
          uri: lb://ms-vehicle-history
          predicates:
            - Path=/api/history/**
          filters:
            - JwtAuthentication

eureka:
  client:
    serviceUrl:
      defaultZone: http://localhost:8761/eureka/

logging:
  level:
    org.springframework.cloud.gateway: TRACE

management:
  endpoints:
    web:
      exposure:
        include: "*"
