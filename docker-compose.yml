version: "3.8"

services:
  # 1. Base de Datos Centralizada
  vrakben-db:
    image: postgres:15
    container_name: vrakben-db
    environment:
      POSTGRES_USER: user_vrakben
      POSTGRES_PASSWORD: password_vrakben
      POSTGRES_DB: vrakben_db
    volumes:
      - vrakben-db-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - vrakben-net

  # 2. Service Discovery (Eureka)
  eureka-server:
    build: ./Backend/eureka-server
    container_name: eureka-server
    ports:
      - "8761:8761"
    networks:
      - vrakben-net

  # 3. API Gateway - Puerta de entrada
  api-gateway:
    build: ./bff
    container_name: api-gateway
    ports:
      - "8080:8080"
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
    depends_on:
      - eureka-server
    networks:
      - vrakben-net

  # 4. Auth Server
  auth-server:
    build: ./ms-auth-server
    container_name: auth-server
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://vrakben-db:5432/vrakben_db
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
    depends_on:
      - vrakben-db
      - eureka-server
    networks:
      - vrakben-net

  # 5. Catálogo de Repuestos (con puerto trasero y BD corregida)
  ms-catalog:
    build: ./ms-catalog
    container_name: ms-catalog
    ports:
      - "8084:8084" # Puerta trasera para acceso directo
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://vrakben-db:5432/vrakben_db
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
    depends_on:
      - vrakben-db
      - eureka-server
    networks:
      - vrakben-net

  # 6. Motor de Inventario
  ms-stock-engine:
    build: ./ms-stock
    container_name: ms-stock-engine
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://vrakben-db:5432/vrakben_db
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
    depends_on:
      - vrakben-db
      - eureka-server
    networks:
      - vrakben-net

  # 7. Carrito de Compras
  ms-shopping-cart:
    build: ./Backend/shopping-cart
    container_name: ms-shopping-cart
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://vrakben-db:5432/vrakben_db
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
    depends_on:
      - vrakben-db
      - eureka-server
    networks:
      - vrakben-net

  # 8. Gestión de Órdenes / Ventas
  ms-order-management:
    build: ./Backend/order-management
    container_name: ms-order-management
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://vrakben-db:5432/vrakben_db
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
    depends_on:
      - vrakben-db
      - eureka-server
    networks:
      - vrakben-net

  # 9. Agendamiento de Citas
  ms-appointment-scheduler:
    build: ./Backend/appointment-scheduler
    container_name: ms-appointment-scheduler
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://vrakben-db:5432/vrakben_db
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
    depends_on:
      - vrakben-db
      - eureka-server
    networks:
      - vrakben-net

  # 10. Historial de Vehículos
  ms-vehicle-history:
    build: ./Backend/vehicle-history
    container_name: ms-vehicle-history
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://vrakben-db:5432/vrakben_db
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
    depends_on:
      - vrakben-db
      - eureka-server
    networks:
      - vrakben-net

  # 11. Órdenes de Trabajo para Mecánicos
  ms-job-orders:
    build: ./Backend/job-orders
    container_name: ms-job-orders
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://vrakben-db:5432/vrakben_db
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
    depends_on:
      - vrakben-db
      - eureka-server
    networks:
      - vrakben-net

  # 12. Solicitudes de Material
  ms-supplier-procurement:
    build: ./Backend/supplier-procurement
    container_name: ms-supplier-procurement
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://vrakben-db:5432/vrakben_db
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
    depends_on:
      - vrakben-db
      - eureka-server
    networks:
      - vrakben-net

networks:
  vrakben-net:
    driver: bridge

volumes:
  vrakben-db-data:
